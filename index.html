<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Personal Dashboard</title>
  <style>
    :root {
      --bg:       #0d1117;
      --surface:  #161b22;
      --surface2: #21262d;
      --border:   #30363d;
      --text:     #e6edf3;
      --muted:    #7d8590;
      --accent:   #58a6ff;
      --green:    #3fb950;
      --red:      #f85149;
      --gold:     #d29922;
      --radius:   12px;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; min-height:100vh; }

    /* Header */
    header { background:var(--surface); border-bottom:1px solid var(--border); padding:0 2rem; height:58px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
    .logo { font-size:1rem; font-weight:700; letter-spacing:-0.02em; }
    .logo span { color:var(--accent); }
    .header-right { display:flex; align-items:center; gap:1rem; }
    #last-updated { font-size:0.72rem; color:var(--muted); }
    .refresh-btn { background:var(--accent); color:#0d1117; border:none; padding:0.35rem 0.85rem; border-radius:6px; font-size:0.75rem; font-weight:700; cursor:pointer; transition:opacity .15s; }
    .refresh-btn:hover { opacity:.85; }
    .refresh-btn:disabled { opacity:.45; cursor:not-allowed; }

    /* Tabs */
    nav { background:var(--surface); border-bottom:1px solid var(--border); padding:0 2rem; display:flex; overflow-x:auto; scrollbar-width:none; }
    nav::-webkit-scrollbar { display:none; }
    .tab-btn { background:none; border:none; border-bottom:2px solid transparent; color:var(--muted); padding:.9rem 1.1rem; font-size:.85rem; font-weight:500; cursor:pointer; white-space:nowrap; transition:color .15s,border-color .15s; }
    .tab-btn:hover { color:var(--text); }
    .tab-btn.active { color:var(--accent); border-bottom-color:var(--accent); }

    /* Layout */
    main { padding:1.75rem 2rem; max-width:1440px; margin:0 auto; }
    .tab-pane { display:none; }
    .tab-pane.active { display:block; }
    .section-label { display:block; font-size:.68rem; font-weight:700; text-transform:uppercase; letter-spacing:.1em; color:var(--muted); margin:.1rem 0 .9rem; }
    .section-label + .section-label { margin-top:2rem; }
    .mt { margin-top:2rem; }

    /* Market cards (indexes & commodities) */
    .grid-4 { display:grid; grid-template-columns:repeat(auto-fill,minmax(210px,1fr)); gap:1rem; }
    .market-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:1.2rem 1.4rem; }
    .mc-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:.8rem; }
    .mc-icon { font-size:1.3rem; }
    .mc-tag { font-size:.6rem; font-weight:700; text-transform:uppercase; letter-spacing:.07em; color:var(--muted); background:var(--surface2); padding:.18rem .45rem; border-radius:4px; }
    .mc-price { font-size:1.45rem; font-weight:700; line-height:1; margin-bottom:.3rem; }
    .mc-name { font-size:.75rem; color:var(--muted); margin-bottom:.55rem; }
    .mc-daily { font-size:.78rem; font-weight:600; margin-bottom:.55rem; }
    .mc-perf { display:flex; gap:1.2rem; }
    .mc-perf-item { display:flex; flex-direction:column; gap:.15rem; }
    .perf-label { font-size:.6rem; text-transform:uppercase; letter-spacing:.07em; color:var(--muted); font-weight:700; }
    .perf-val { font-size:.78rem; font-weight:700; }
    .up   { color:var(--green); }
    .down { color:var(--red); }
    .flat { color:var(--muted); }

    /* Stock watchlist tables */
    .stock-table-wrap { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; }
    .stock-table { width:100%; border-collapse:collapse; }
    .stock-table th { font-size:.62rem; font-weight:700; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); padding:.65rem 1rem; text-align:right; background:var(--surface2); border-bottom:1px solid var(--border); }
    .stock-table th:first-child { text-align:left; }
    .stock-table td { padding:.7rem 1rem; font-size:.83rem; text-align:right; border-bottom:1px solid var(--border); font-weight:500; color:var(--text); }
    .stock-table td:first-child { text-align:left; }
    .stock-table tr:last-child td { border-bottom:none; }
    .stock-table tbody tr:hover td { background:var(--surface2); }
    .stock-name { font-weight:600; }
    .stock-sym { display:inline-block; font-size:.62rem; color:var(--muted); background:var(--surface2); padding:.1rem .38rem; border-radius:3px; margin-left:.4rem; font-weight:700; }
    .ev-val { color:var(--gold); font-weight:700; }
    .dash { color:var(--muted); font-size:.75rem; }

    /* News cards */
    .grid-3 { display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:1rem; }
    a.news-card { display:flex; flex-direction:column; gap:.6rem; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:1.25rem 1.4rem; text-decoration:none; color:inherit; transition:border-color .15s,transform .1s; }
    a.news-card:hover { border-color:var(--accent); transform:translateY(-2px); }
    .nc-source { font-size:.68rem; font-weight:700; text-transform:uppercase; letter-spacing:.07em; color:var(--accent); }
    .nc-headline { font-size:.92rem; font-weight:600; line-height:1.45; }
    .nc-snippet { font-size:.78rem; color:var(--muted); line-height:1.55; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; }
    .nc-meta { font-size:.7rem; color:var(--muted); margin-top:auto; }
    .badge { display:inline-block; padding:.18rem .5rem; border-radius:4px; font-size:.62rem; font-weight:700; text-transform:uppercase; letter-spacing:.06em; align-self:flex-start; }
    .badge-tower      { background:rgba(88,166,255,.15); color:#58a6ff; }
    .badge-datacenter { background:rgba(188,140,255,.15); color:#bc8cff; }
    .badge-fiber      { background:rgba(63,185,80,.15);  color:#3fb950; }
    .badge-spectrum   { background:rgba(210,153,34,.15); color:#d29922; }
    .badge-ma         { background:rgba(248,81,73,.15);  color:#f85149; }
    .deal-hi { color:#ff79c6; font-weight:700; } /* pink: deal price, multiples, buyer/seller */

    /* Executive Summary */
    .exec-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:1.25rem; }
    .exec-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:1.25rem 1.4rem; }
    .exec-card h3 { font-size:.68rem; font-weight:700; text-transform:uppercase; letter-spacing:.1em; color:var(--accent); padding-bottom:.75rem; border-bottom:1px solid var(--border); margin-bottom:.75rem; }
    .exec-row { display:flex; justify-content:space-between; align-items:center; padding:.42rem 0; border-bottom:1px solid var(--border); font-size:.82rem; }
    .exec-row:last-child { border-bottom:none; }
    .exec-row-label { color:var(--muted); }
    .exec-row-right { display:flex; align-items:center; gap:.45rem; font-weight:600; }
    .exec-news-item { padding:.52rem 0; border-bottom:1px solid var(--border); font-size:.81rem; line-height:1.4; cursor:pointer; transition:color .15s; }
    .exec-news-item:last-child { border-bottom:none; }
    .exec-news-item:hover { color:var(--accent); }
    .exec-news-src { font-size:.66rem; color:var(--muted); margin-bottom:.18rem; }

    /* Loading / error */
    .loading { display:flex; align-items:center; justify-content:center; padding:3rem; color:var(--muted); font-size:.85rem; gap:.75rem; }
    .spinner { width:18px; height:18px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .7s linear infinite; flex-shrink:0; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .error-msg { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:1.25rem 1.4rem; color:var(--muted); font-size:.83rem; }
    .api-note { font-size:.72rem; color:var(--muted); margin-top:1rem; padding:.6rem 1rem; background:var(--surface2); border-radius:6px; border-left:3px solid var(--gold); }

    /* Daily pulse banner */
    .daily-pulse { margin-top:2rem; background:var(--surface); border:1px solid var(--border); border-left:4px solid var(--accent); border-radius:var(--radius); padding:1.75rem 2rem; }
    .daily-pulse-label { font-size:.65rem; font-weight:700; text-transform:uppercase; letter-spacing:.12em; color:var(--accent); margin-bottom:.85rem; }
    .daily-pulse-text { font-size:1.35rem; font-weight:600; line-height:1.55; color:var(--text); }
    .daily-pulse-text.loading { color:var(--muted); font-style:italic; font-size:1rem; }

    @media (max-width:640px) { main { padding:1rem; } header,nav { padding-left:1rem; padding-right:1rem; } }
  </style>
</head>
<body>

<header>
  <div class="logo">My <span>Dashboard</span></div>
  <div class="header-right">
    <span id="last-updated">Not loaded</span>
    <button class="refresh-btn" onclick="initDashboard(true)">↻ Refresh</button>
  </div>
</header>

<nav>
  <button class="tab-btn active" data-tab="summary">⚡ Executive Summary</button>
  <button class="tab-btn"        data-tab="markets">📈 Markets</button>
  <button class="tab-btn"        data-tab="ma">🤝 M&A News</button>
  <button class="tab-btn"        data-tab="digital">📡 Digital Sector</button>
  <button class="tab-btn"        data-tab="pop">🎬 Pop Culture</button>
</nav>

<main>
  <div id="tab-summary" class="tab-pane active"><div class="loading"><div class="spinner"></div>Loading...</div></div>
  <div id="tab-markets" class="tab-pane"><div class="loading"><div class="spinner"></div>Loading market data...</div></div>
  <div id="tab-ma"      class="tab-pane"><div class="loading"><div class="spinner"></div>Loading M&A news...</div></div>
  <div id="tab-digital" class="tab-pane"><div class="loading"><div class="spinner"></div>Loading digital sector news...</div></div>
  <div id="tab-pop"     class="tab-pane"><div class="loading"><div class="spinner"></div>Loading trending news...</div></div>
</main>

<script>
// ================================================================
//  API KEYS
// ================================================================
const POLYGON_KEY   = 'jrf6BjpxqkApaq6iHjfGWAE6DaYBNn0j';
const FRED_API_KEY  = '45a3e301b2685ec4696090e073190a85';
const FMP_API_KEY   = 'YOUR_FMP_API_KEY'; // REPLACE — free at https://site.financialmodelingprep.com/register
const MARKETAUX_KEY = 'SQOYuRafohNksHc21I6hptak8ckei0qFo75z61jb';
// ================================================================
//  NOTE ON DATA SOURCES:
//  Quotes  → Polygon.io (free tier: unlimited calls, no per-min cap)
//  Rates   → FRED API  (free: 1000 calls/day, all fetched in parallel)
//  EV/EBITDA → FMP     (free: 250 calls/day, cached 24 hr)
//  Quotes cached 30 min, rates cached 4 hr — all in localStorage.
// ================================================================

// ── Instruments ──────────────────────────────────────────────────
const INSTRUMENTS = [
  // Indexes — polyTicker uses Polygon index prefix (I:)
  { id:'spy',  symbol:'SPX',  polyTicker:'I:SPX',     name:'S&P 500',          group:'index',    icon:'📊', hasEV:false },
  { id:'qqq',  symbol:'COMP', polyTicker:'I:COMP',    name:'Nasdaq Composite', group:'index',    icon:'💻', hasEV:false },
  { id:'dia',  symbol:'DJI',  polyTicker:'I:DJI',     name:'Dow Jones',        group:'index',    icon:'🏭', hasEV:false },
  { id:'iwm',  symbol:'IWM',                          name:'Russell 2000',     group:'index',    icon:'📉', hasEV:false },
  // Commodities & Crypto
  { id:'gld',  symbol:'GLD',                          name:'Gold (GLD ETF)',   group:'commodity',icon:'🥇', hasEV:false },
  { id:'uso',  symbol:'USO',                          name:'Crude Oil (USO)',  group:'commodity',icon:'🛢️', hasEV:false },
  { id:'ung',  symbol:'UNG',                          name:'Nat Gas (UNG ETF)',group:'commodity',icon:'🔥', hasEV:false },
  { id:'btc',  symbol:'BTC',  polyTicker:'X:BTCUSD',  name:'Bitcoin',          group:'commodity',icon:'₿',  hasEV:false },
  // Financial Services
  { id:'blk',   symbol:'BLK',   name:'BlackRock',      group:'finsvcs',  icon:'🏦', hasEV:true},
  { id:'bx',    symbol:'BX',    name:'Blackstone',     group:'finsvcs',  icon:'🏦', hasEV:true},
  { id:'kkr',   symbol:'KKR',   name:'KKR',            group:'finsvcs',  icon:'🏦', hasEV:true},
  { id:'apo',   symbol:'APO',   name:'Apollo Global',  group:'finsvcs',  icon:'🏦', hasEV:true},
  // Carriers
  { id:'t',     symbol:'T',     name:'AT&T',           group:'carriers', icon:'📱', hasEV:true},
  { id:'tmus',  symbol:'TMUS',  name:'T-Mobile',       group:'carriers', icon:'📱', hasEV:true},
  { id:'vz',    symbol:'VZ',    name:'Verizon',        group:'carriers', icon:'📡', hasEV:true},
  { id:'cmcsa', symbol:'CMCSA', name:'Comcast',        group:'carriers', icon:'📺', hasEV:true},
  // Towercos
  { id:'amt',   symbol:'AMT',   name:'American Tower', group:'towercos', icon:'🗼', hasEV:true},
  { id:'sbac',  symbol:'SBAC',  name:'SBA Comms',      group:'towercos', icon:'🗼', hasEV:true},
  { id:'cci',   symbol:'CCI',   name:'Crown Castle',   group:'towercos', icon:'🗼', hasEV:true},
  { id:'clnx',  symbol:'CLNX', name:'Cellnex',        group:'towercos', icon:'🗼', hasEV:true},
];

// ── Rates & Yields ────────────────────────────────────────────────
const RATES = [
  { id:'treasury10y', name:'10-Year Treasury', fredId:'DGS10' },
  { id:'fedfunds',    name:'Fed Funds Rate',   fredId:'DFF' },
  { id:'sofr3m',      name:'SOFR 3-Month Avg', fredId:'SOFR90DAYAVG' },
  { id:'corepce',     name:'Core PCE (YoY)',   fredId:'PCEPILFE', fredUnits:'pc1' },
];

// ── State ─────────────────────────────────────────────────────────
const S = {
  markets: Object.fromEntries(INSTRUMENTS.map(i => [i.id, { quote:null, ntmEV:null }])),
  rates:   Object.fromEntries(RATES.map(r => [r.id, null])),
  ma:[], digital:{ towers:[], dc:[], fiber:[], spectrum:[] }, pop:[]
};

// ── localStorage cache ────────────────────────────────────────────
function cacheGet(key, ttlMs) {
  try {
    const raw = localStorage.getItem('dash_' + key);
    if (!raw) return null;
    const { ts, data } = JSON.parse(raw);
    if (Date.now() - ts > ttlMs) return null;
    return data;
  } catch { return null; }
}
function cacheSet(key, data) {
  try { localStorage.setItem('dash_' + key, JSON.stringify({ ts: Date.now(), data })); } catch {}
}

// ── Helpers ───────────────────────────────────────────────────────
const sleep = ms => new Promise(r => setTimeout(r, ms));

// Fetch with a hard timeout — prevents hung requests from blocking renders
async function fetchWithTimeout(url, ms = 10000) {
  const ac = new AbortController();
  const id = setTimeout(() => ac.abort(), ms);
  try {
    const res = await fetch(url, { signal: ac.signal });
    clearTimeout(id);
    return res;
  } catch(e) { clearTimeout(id); throw e; }
}
function pct(n)  { if (n === null || n === undefined) return null; return parseFloat(n); }
function fmtPct(v, decimals = 1) {
  if (v === null || isNaN(v)) return null;
  return (v >= 0 ? '+' : '') + v.toFixed(decimals) + '%';
}
function fmtPrice(v) { return '$' + Number(v).toLocaleString('en-US', { minimumFractionDigits:2, maximumFractionDigits:2 }); }
function changeClass(v) { if (!v && v !== 0) return 'flat'; return v >= 0 ? 'up' : 'down'; }
function arrow(v) { if (!v && v !== 0) return ''; return v >= 0 ? '▲ ' : '▼ '; }
function timeAgo(iso) {
  const d = (Date.now() - new Date(iso)) / 1000;
  if (d < 3600) return Math.round(d/60) + 'm ago';
  if (d < 86400) return Math.round(d/3600) + 'h ago';
  return Math.round(d/86400) + 'd ago';
}

// ── Polygon.io: quotes + YTD ──────────────────────────────────────
// Single daily-bar range call covers both today's change and YTD.
// polyTicker overrides symbol for Polygon's I: (index) and X: (crypto) prefixes.
async function fetchQuote(inst) {
  const ck  = 'q_' + inst.id;
  const hit = cacheGet(ck, 30 * 60 * 1000);
  if (hit) return hit;
  try {
    const ticker   = encodeURIComponent(inst.polyTicker || inst.symbol);
    const ytdStart = `${new Date().getFullYear()}-01-01`;
    const today    = new Date().toISOString().split('T')[0];
    const url = `https://api.polygon.io/v2/aggs/ticker/${ticker}/range/1/day/${ytdStart}/${today}?adjusted=true&sort=asc&limit=300&apiKey=${POLYGON_KEY}`;
    const j = await (await fetchWithTimeout(url)).json();
    if (!j.results?.length) return null;
    const bars   = j.results;
    const latest = bars[bars.length - 1];
    const prev   = bars.length >= 2 ? bars[bars.length - 2] : null;
    const price  = latest.c;
    const change = prev ? latest.c - prev.c : 0;
    const chgPct = prev ? (change / prev.c) * 100 : 0;
    const ytdPct = ((latest.c - bars[0].o) / bars[0].o) * 100;
    const result = { price, change, pct: chgPct, ytdPct };
    cacheSet(ck, result);
    return result;
  } catch { return null; }
}

// ── FRED: SOFR + Core PCE ─────────────────────────────────────────
async function fetchFRED(rate) {
  const ck  = 'fred_' + rate.id;
  const hit = cacheGet(ck, 4 * 3600 * 1000);
  if (hit) return hit;
  try {
    const units = rate.fredUnits ? `&units=${rate.fredUnits}` : '';
    const url   = `https://api.stlouisfed.org/fred/series/observations?series_id=${rate.fredId}&sort_order=desc&limit=30${units}&file_type=json&api_key=${FRED_API_KEY}`;
    const j     = await (await fetchWithTimeout(url)).json();
    const obs   = (j.observations || []).filter(o => o.value !== '.' && o.value !== 'NA');
    if (!obs.length) return null;
    const latest  = parseFloat(obs[0].value);
    const prev    = parseFloat(obs[1]?.value);
    const bpToday = prev !== undefined ? Math.round((latest - prev) * 100) : null;
    const curYear = new Date().getFullYear();
    const ytdBase = obs.find(o => new Date(o.date).getFullYear() < curYear);
    const bpYTD   = ytdBase ? Math.round((latest - parseFloat(ytdBase.value)) * 100) : null;
    const result  = { value: latest, bpToday, bpYTD, date: obs[0].date };
    cacheSet(ck, result);
    return result;
  } catch { return null; }
}

// ── FMP: EV / NTM EBITDA ─────────────────────────────────────────
// Fetches enterprise value + next-year analyst EBITDA consensus,
// then calculates the forward multiple. Two FMP calls per stock,
// cached 24 hours (runs once per day, well under 250/day free tier).
async function fetchNTMEvEbitda(inst) {
  const ck  = 'ntm_' + inst.id;
  const hit = cacheGet(ck, 24 * 3600 * 1000);
  if (hit) return hit;
  try {
    const [evRes, estRes] = await Promise.all([
      fetchWithTimeout(`https://financialmodelingprep.com/api/v3/enterprise-values/${inst.symbol}?limit=1&apikey=${FMP_API_KEY}`),
      fetchWithTimeout(`https://financialmodelingprep.com/api/v3/analyst-estimates/${inst.symbol}?limit=4&apikey=${FMP_API_KEY}`)
    ]);
    const [evData, estData] = await Promise.all([evRes.json(), estRes.json()]);
    const ev = evData[0]?.enterpriseValue;
    if (!ev || !Array.isArray(estData) || !estData.length) return null;
    // NTM EBITDA = next future fiscal year's consensus EBITDA estimate
    const ntm     = estData.find(e => new Date(e.date) > new Date());
    const ntmEbitda = ntm?.estimatedEbitdaAvg;
    if (!ntmEbitda || ntmEbitda <= 0) return null;
    const result = { multiple: ev / ntmEbitda };
    cacheSet(ck, result);
    return result;
  } catch { return null; }
}

async function loadNTMEV() {
  for (const inst of INSTRUMENTS.filter(i => i.hasEV)) {
    const data = await fetchNTMEvEbitda(inst);
    S.markets[inst.id].ntmEV = data;
    renderMarkets();
    await sleep(300); // gentle stagger — FMP is lenient but avoid burst
  }
}

// ── Load markets ──────────────────────────────────────────────────
async function loadMarkets() {
  await Promise.all(INSTRUMENTS.map(async inst => {
    const q = await fetchQuote(inst);
    S.markets[inst.id].quote = q;
    renderMarkets();
    renderSummary();
  }));
}

// ── Load rates ────────────────────────────────────────────────────
async function loadRates() {
  await Promise.all(RATES.map(async rate => {
    const data = await fetchFRED(rate);
    S.rates[rate.id] = data;
    renderMarkets();
  }));
}

// ── Render: Markets ───────────────────────────────────────────────
function perfCell(val) {
  if (val === null || val === undefined) return `<span class="dash">—</span>`;
  return `<span class="${changeClass(val)}">${fmtPct(val)}</span>`;
}

function marketCardHTML(inst) {
  const { quote } = S.markets[inst.id];
  const priceStr = quote ? fmtPrice(quote.price) : '—';
  const cls      = quote ? changeClass(quote.pct) : 'flat';
  const dailyStr = quote && quote.pct !== null
    ? `${arrow(quote.pct)}${fmtPct(quote.pct)} today`
    : (quote ? 'Live price' : 'Awaiting data…');
  const ytdPct   = quote ? quote.ytdPct : null;
  return `
    <div class="market-card">
      <div class="mc-top"><span class="mc-icon">${inst.icon}</span><span class="mc-tag">${inst.symbol}</span></div>
      <div class="mc-price">${priceStr}</div>
      <div class="mc-name">${inst.name}</div>
      <div class="mc-daily ${cls}">${dailyStr}</div>
      <div class="mc-perf">
        <div class="mc-perf-item">
          <span class="perf-label">YTD</span>
          <span class="perf-val ${changeClass(ytdPct)}">${fmtPct(ytdPct) || '—'}</span>
        </div>
      </div>
    </div>`;
}

function bpCell(bp) {
  if (bp === null || bp === undefined) return `<span class="dash">—</span>`;
  const cls  = bp > 0 ? 'up' : (bp < 0 ? 'down' : 'flat');
  const sign = bp > 0 ? '+' : '';
  return `<span class="${cls}">${sign}${bp} bps</span>`;
}

function ratesTableHTML() {
  const rows = RATES.map(rate => {
    const d    = S.rates[rate.id];
    const val  = d ? `${d.value.toFixed(2)}%` : `<span class="dash">—</span>`;
    const date = d ? `<span style="font-size:.62rem;color:var(--muted);margin-left:.4rem">${d.date}</span>` : '';
    return `<tr>
      <td><span class="stock-name">${rate.name}</span>${date}</td>
      <td>${val}</td>
      <td>${bpCell(d ? d.bpToday : null)}</td>
      <td>${bpCell(d ? d.bpYTD : null)}</td>
    </tr>`;
  }).join('');
  return `
    <div class="stock-table-wrap">
      <table class="stock-table">
        <thead><tr><th>Rate / Yield</th><th>Current</th><th>Today (bps)</th><th>YTD (bps)</th></tr></thead>
        <tbody>${rows}</tbody>

    </div>`;
}

function stockTableHTML(instruments) {
  const rows = instruments.map(inst => {
    const { quote, ntmEV } = S.markets[inst.id];

    const daily    = quote && quote.pct !== null ? `${arrow(quote.pct)}${fmtPct(quote.pct)}` : `<span class="dash">—</span>`;
    const evStr    = ntmEV ? `<span class="ev-val">${ntmEV.multiple.toFixed(1)}x</span>` : `<span class="dash">—</span>`;
    return `<tr>
      <td><span class="stock-name">${inst.name}</span><span class="stock-sym">${inst.symbol}</span></td>
      <td>${price}</td>
      <td class="${dailyCls}">${daily}</td>
      <td>${perfCell(quote ? quote.ytdPct : null)}</td>
      <td>${evStr}</td>
    </tr>`;
  }).join('');
  return `
    <div class="stock-table-wrap">
      <table class="stock-table">
        <thead><tr><th>Company</th><th>Price</th><th>Today</th><th>YTD</th><th>EV/NTM EBITDA</th></tr></thead>

}

// ── CORS proxy (for RSS feeds) ────────────────────────────────────
const PROXY = 'https://corsproxy.io/?';

// ── Marketaux: M&A deals ──────────────────────────────────────────
async function fetchMarketaux() {
  try {
    const from = new Date(Date.now() - 7*864e5).toISOString().split('T')[0]; // YYYY-MM-DD
    const url  = `https://api.marketaux.com/v1/news/all?topics=mergers_acquisitions&language=en&filter_entities=true&published_after=${from}&limit=20&api_token=${MARKETAUX_KEY}`;
    const json = await (await fetchWithTimeout(url)).json();
    return (json.data || []).map(a => ({
      title:       a.title,
      description: a.description,
      url:         a.url,
      publishedAt: a.published_at,
      source:      { name: a.source },
      entities:    a.entities || []
    }));
  } catch { return []; }
}

// ── RSS feed fetcher ──────────────────────────────────────────────
async function fetchRSS(feedUrl, sourceName) {
  try {
    const res  = await fetchWithTimeout(PROXY + encodeURIComponent(feedUrl), 12000);
    const text = await res.text();
    const xml  = new DOMParser().parseFromString(text, 'text/xml');
    const items = [...xml.querySelectorAll('item, entry')].slice(0, 8);
    return items.map(item => {
      const txt  = tag => item.querySelector(tag)?.textContent?.trim() || '';
      const linkEl = item.querySelector('link');
      const url  = linkEl?.getAttribute('href') || linkEl?.textContent?.trim() || txt('guid');
      const desc = txt('description') || txt('summary') || txt('content');
      return {
        title:       txt('title').replace(/<!\[CDATA\[|\]\]>/g, '').trim(),
        description: desc.replace(/<!\[CDATA\[|\]\]>/g, '').replace(/<[^>]+>/g, '').trim().slice(0, 280),
        url:         url.replace(/<!\[CDATA\[|\]\]>/g, '').trim(),
        publishedAt: txt('pubDate') || txt('published') || txt('updated') || new Date().toISOString(),
        source:      { name: sourceName }
      };
    }).filter(a => a.title && a.url);
  } catch { return []; }
}

// ── Deal term highlighter (pink) ──────────────────────────────────
function highlightDeal(text) {
  if (!text) return '';
  return text.replace(
    /(\$[\d,]+\.?\d*\s*(?:billion|million|trillion|bn|mn)\b|\$[\d,]+\.?\d*[BMT]\b|\b\d+\.?\d*x(?:\s*(?:EBITDA|EV\/EBITDA|revenue|NTM|LTM))?)/gi,
    '<span class="deal-hi">$1</span>'
  );
}


const DIGITAL_MUST = {
  towers:   t => /\b(cell tower|tower site|tower compan|telecom tower|macro tower|american tower|crown castle|sba communications|vertical bridge|uniti towers|tillman)\b/i.test(t),
  dc:       t => /\b(data center|hyperscale|colocation|colo\b|megawatt|mw capacity|compute campus|ai campus|cloud campus)\b/i.test(t),
  fiber:    t => /\b(fiber.to.the|ftth|fiber network|dark fiber|fiber optic|broadband.*build|fiber.*deploy|fiber.*mile|homes passed)\b/i.test(t),
  spectrum: t => /\b(spectrum|fcc auction|cbrs|c.band|mmwave|mid.band|radio.*license|spectrum.*license|auction.*band)\b/i.test(t),
};

// ── News card (general) ───────────────────────────────────────────
function newsCardHTML(article, badgeType) {
  const badge = badgeType ? `<span class="badge badge-${badgeType}">${badgeType.replace('datacenter','data center')}</span>` : '';
  return `
    <a class="news-card" href="${article.url}" target="_blank" rel="noopener noreferrer">
      ${badge}
      <div class="nc-source">${article.source?.name || 'News'}</div>
      <div class="nc-headline">${article.title}</div>
      ${article.description ? `<div class="nc-snippet">${article.description}</div>` : ''}
      <div class="nc-meta">${timeAgo(article.publishedAt)}</div>
    </a>`;
}

// ── M&A card (highlighted deal terms in pink) ─────────────────────
function maCardHTML(article) {
  const title   = highlightDeal(article.title || '');
  const snippet = highlightDeal(article.description || '');
  return `
    <a class="news-card" href="${article.url}" target="_blank" rel="noopener noreferrer">
      <span class="badge badge-ma">M&amp;A</span>
      <div class="nc-source">${article.source?.name || 'News'}</div>
      <div class="nc-headline">${title}</div>
      ${snippet ? `<div class="nc-snippet">${snippet}</div>` : ''}
      <div class="nc-meta">${timeAgo(article.publishedAt)}</div>
    </a>`;
}

// ── M&A loader ────────────────────────────────────────────────────
async function loadMA() {
  const raw = await fetchMarketaux();
  if (raw.length) {
    S.ma = raw.slice(0, 9);
    cacheSet('news_ma', S.ma);
  }
  renderMA(); renderSummary();
}
function renderMA() {

    return;
  }
  el.innerHTML = `
    <span class="section-label">Confirmed M&amp;A Transactions — deal price &amp; multiples highlighted in <span class="deal-hi" style="text-transform:none;letter-spacing:0">pink</span></span>
    <div class="grid-3">${S.ma.map(maCardHTML).join('')}</div>`;
}

// ── Digital sector loader ─────────────────────────────────────────
// Fetches specialist RSS feeds, then splits articles into sub-sections
// using client-side keyword filters.
const DIGITAL_FEEDS = [
  { url: 'https://www.lightreading.com/rss/',                    name: 'Light Reading' },
  { url: 'https://www.rcrwireless.com/feed',                     name: 'RCR Wireless' },
  { url: 'https://www.datacenterdynamics.com/en/rss/',           name: 'Data Center Dynamics' },
  { url: 'https://www.fiercetelecom.com/rss/xml',                name: 'Fierce Telecom' },
  { url: 'https://www.telecomramblings.com/feed/',               name: 'Telecom Ramblings' },
];

async function loadDigital() {
  const allArrays = await Promise.all(DIGITAL_FEEDS.map(f => fetchRSS(f.url, f.name)));
  const all = allArrays.flat();
  if (all.length) {
    const txt = a => (a.title||'')+' '+(a.description||'');
    S.digital.towers   = all.filter(a => DIGITAL_MUST.towers(txt(a))).slice(0, 4);
    S.digital.dc       = all.filter(a => DIGITAL_MUST.dc(txt(a))).slice(0, 4);
    S.digital.fiber    = all.filter(a => DIGITAL_MUST.fiber(txt(a))).slice(0, 4);
    S.digital.spectrum = all.filter(a => DIGITAL_MUST.spectrum(txt(a))).slice(0, 4);
    cacheSet('news_digital', S.digital);
  }
  renderDigital(); renderSummary();
}
function renderDigital() {
  const el = document.getElementById('tab-digital');
  const sec = (label, articles, badge) => {
    const cards = articles.length
      ? `<div class="grid-3">${articles.map(a=>newsCardHTML(a,badge)).join('')}</div>`
      : `<div class="error-msg" style="margin-bottom:1rem">No qualifying articles found for this category in the last 5 days.</div>`;

  };
  el.innerHTML =
    sec('📡 Cell Towers',    S.digital.towers,   'tower')      +

}

  { url: 'https://variety.com/feed/',               name: 'Variety' },
  { url: 'https://www.rollingstone.com/feed/',      name: 'Rolling Stone' },

];

async function loadPop() {

// ── Daily pulse sentence ──────────────────────────────────────────
function buildDailySentence() {
  const spy = S.markets['spy']?.quote;
  const allDigital = [
    ...S.digital.towers, ...S.digital.dc,
    ...S.digital.fiber,  ...S.digital.spectrum,
  ];
  const clean = s => (s || '').replace(/<[^>]+>/g, '').trim();

  // Market clause
  let mktClause = '';
  if (spy && spy.pct !== null) {
    const mag = Math.abs(spy.pct);
    const verb = spy.pct >  0.4 ? 'rallied'
               : spy.pct < -0.4 ? 'sold off'
               : 'traded roughly flat';
    mktClause = `Equities ${verb} ${mag >= 0.1 ? mag.toFixed(1) + '%' : ''}`.trim();
  }

  // M&A clause — use top deal headline
  let dealClause = '';
  if (S.ma.length) {
    let t = clean(S.ma[0].title);
    if (t.length > 130) t = t.slice(0, 127) + '…';
    dealClause = t;
  }

  // Digital / tech clause
  let techClause = '';
  if (allDigital.length) {
    let t = clean(allDigital[0].title);
    if (t.length > 110) t = t.slice(0, 107) + '…';
    techClause = t.charAt(0).toLowerCase() + t.slice(1);
  }

  // Assemble
  if (mktClause && dealClause && techClause) {
    return `${mktClause} as ${dealClause.charAt(0).toLowerCase() + dealClause.slice(1)}, while ${techClause}.`;
  } else if (mktClause && dealClause) {
    return `${mktClause} as ${dealClause.charAt(0).toLowerCase() + dealClause.slice(1)}.`;
  } else if (mktClause && techClause) {
    return `${mktClause} as ${techClause}.`;
  } else if (dealClause) {
    return `${dealClause}${techClause ? ', while ' + techClause : ''}.`;
  }
  return null; // still loading
}

// ── Executive Summary ─────────────────────────────────────────────
function renderSummary() {
  const mktRows = INSTRUMENTS.slice(0,8).map(inst => {
    const { quote } = S.markets[inst.id];
    const price  = quote ? fmtPrice(quote.price) : '—';
    const cls    = quote ? changeClass(quote.pct) : 'flat';
    const pctStr = quote && quote.pct !== null ? `<span class="${cls}" style="font-size:.74rem">${fmtPct(quote.pct)}</span>` : '';
    const ytdStr = quote && quote.ytdPct !== null ? `<span class="${changeClass(quote.ytdPct)}" style="font-size:.7rem;margin-left:.3rem">${fmtPct(quote.ytdPct)} YTD</span>` : '';
    return `<div class="exec-row">
      <span class="exec-row-label">${inst.icon} ${inst.name}</span>
      <span class="exec-row-right"><span style="color:var(--text)">${price}</span>${pctStr}${ytdStr}</span>
    </div>`;
  }).join('');

  const newsItems = (articles, max=4) => articles.slice(0,max).map(a =>
    `<div class="exec-news-item" onclick="window.open('${a.url}','_blank')">
      <div class="exec-news-src">${a.source?.name||''} · ${timeAgo(a.publishedAt)}</div>
      ${a.title}
    </div>`
  ).join('') || `<div style="color:var(--muted);font-size:.8rem;padding:.4rem 0">Loading…</div>`;

  const topDigital = [
    ...(S.digital.towers.slice(0,1)),
    ...(S.digital.dc.slice(0,1)),
    ...(S.digital.fiber.slice(0,1)),
    ...(S.digital.spectrum.slice(0,1)),
  ];

  const sentence = buildDailySentence();
  const pulseHTML = `
    <div class="daily-pulse">
      <div class="daily-pulse-label">Today at a glance</div>
      <div class="daily-pulse-text${sentence ? '' : ' loading'}">${sentence || 'Loading today\'s summary…'}</div>
    </div>`;

  document.getElementById('tab-summary').innerHTML = `
    <div class="exec-grid">
      <div class="exec-card"><h3>📈 Market Snapshot</h3>${mktRows || '<div style="color:var(--muted);font-size:.8rem">Loading…</div>'}</div>
      <div class="exec-card"><h3>🤝 Top M&amp;A Headlines</h3>${newsItems(S.ma)}</div>
      <div class="exec-card"><h3>📡 Digital Sector Highlights</h3>${newsItems(topDigital)}</div>
      <div class="exec-card"><h3>🎬 Trending Now</h3>${newsItems(S.pop)}</div>
    </div>
    ${pulseHTML}`;
}

// ── Tab switching ─────────────────────────────────────────────────
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
  });
});

// ── Init ──────────────────────────────────────────────────────────
async function initDashboard(force = false) {
  const btn = document.querySelector('.refresh-btn');
  if (btn) { btn.disabled = true; btn.textContent = '↻ Loading…'; }

  // Force-refresh: wipe all caches so everything re-fetches fresh
  if (force) {
    ['news_ma','news_digital','news_pop'].forEach(k => {
      try { localStorage.removeItem('dash_' + k); } catch {}
    });
    INSTRUMENTS.forEach(i => { try { localStorage.removeItem('dash_q_' + i.id); } catch {} });
    RATES.forEach(r => { try { localStorage.removeItem('dash_fred_' + r.id); } catch {} });
  }

  // Reset market/rate state (quotes re-populate from cache or live fetch)
  INSTRUMENTS.forEach(i => { S.markets[i.id] = { quote:null, ntmEV:null }; });
  RATES.forEach(r => { S.rates[r.id] = null; });

  // Restore cached news immediately — show content instead of spinners
  const cachedMA      = cacheGet('news_ma',      30 * 60 * 1000);
  const cachedDigital = cacheGet('news_digital',  30 * 60 * 1000);
  const cachedPop     = cacheGet('news_pop',      30 * 60 * 1000);
  S.ma      = cachedMA      || [];
  S.digital = cachedDigital || { towers:[], dc:[], fiber:[], spectrum:[] };
  S.pop     = cachedPop     || [];

  // Only show spinner for sections with no cached data
  document.getElementById('tab-markets').innerHTML =
    `<div class="loading"><div class="spinner"></div>Loading market data…</div>`;
  if (!S.ma.length)
    document.getElementById('tab-ma').innerHTML =
      `<div class="loading"><div class="spinner"></div>Loading M&A deals…</div>`;
  if (!Object.values(S.digital).flat().length)
    document.getElementById('tab-digital').innerHTML =
      `<div class="loading"><div class="spinner"></div>Loading digital sector…</div>`;
  if (!S.pop.length)
    document.getElementById('tab-pop').innerHTML =
      `<div class="loading"><div class="spinner"></div>Loading trending news…</div>`;

  renderSummary();
  document.getElementById('last-updated').textContent = 'Updating…';

  await Promise.all([ loadMA(), loadDigital(), loadPop(), loadMarkets(), loadRates(), loadNTMEV() ]);

  const t = new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
  document.getElementById('last-updated').textContent = `Updated ${t}`;
  if (btn) { btn.disabled = false; btn.textContent = '↻ Refresh'; }
}

initDashboard();
setInterval(initDashboard, 30 * 60 * 1000); // auto-refresh every 30 min
</script>
